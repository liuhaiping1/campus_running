spring:
  application:
    name: campus-errand-backend
  profiles:
    active: dev

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_errand?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  # 文件上传 multipart 配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.backend.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  expiration: 86400000

# SpringDoc OpenAPI配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# 高德地图配置（web-service-key 在 application-dev.yml 中配置，生产环境通过环境变量注入）
amap:
  base-url: ${AMAP_BASE_URL:https://restapi.amap.com}
  timeout-ms: ${AMAP_TIMEOUT_MS:5000}
  enabled: ${AMAP_ENABLED:true}

# 文件上传配置
upload:
  local-dir: ${UPLOAD_LOCAL_DIR:uploads}
  public-prefix: ${UPLOAD_PUBLIC_PREFIX:/uploads}
  max-size-mb: ${UPLOAD_MAX_SIZE_MB:5}
  allowed-types: ${UPLOAD_ALLOWED_TYPES:jpg,jpeg,png,webp,pdf}

# 服务端口
server:
  port: 8080
