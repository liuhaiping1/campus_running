spring:
  # 使用H2内存数据库进行测试
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:schema-h2.sql'
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # 禁用Redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000

  # Security配置
  security:
    jwt:
      secret: testSecretKeyForTestingPurposesOnlyMustBeLongEnough1234567890
      expiration: 86400000

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.example.backend: DEBUG
    org.springframework.security: DEBUG

# 测试专用配置
app:
  jwt:
    secret: testSecretKeyForTestingPurposesOnlyMustBeLongEnough1234567890
    expiration: 86400000

# 支付宝沙箱配置（测试用）
alipay:
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  app-id: test_app_id
  private-key: test_private_key
  alipay-public-key: test_alipay_public_key
  return-url: http://localhost:8080/api/pay/return
  notify-url: http://localhost:8080/api/pay/notify

# 高德地图配置（测试用）
amap:
  base-url: https://restapi.amap.com
  web-service-key: test_key
  timeout-ms: 5000
  enabled: false
